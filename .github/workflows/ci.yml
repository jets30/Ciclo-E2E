name: CI - Playwright + BDD

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Playwright tests and BDD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (headed=false)
        run: npx playwright test --reporter=html || true

      - name: Archive Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Run BDD tests (Cucumber)
        run: |
          mkdir -p reports
          npm run bdd:test || true

      - name: Generate BDD HTML report
        run: npm run bdd:report || true

      - name: Archive BDD report and evidences
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-evidences
          path: |
            reports/cucumber.json
            evidencias/bdd-report.html
            evidencias/bdd/**
            evidencias/ui/**

      - name: Archive test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

      - name: Upload repository README and docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: |
            README.md
            docs/**

      - name: Set summary
        if: always()
        run: |
          echo "Generated artifacts: playwright-report, bdd-evidences, test-results" > summary.txt
          echo "Artifacts attached in workflow run." >> summary.txt

  
